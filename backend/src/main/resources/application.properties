spring.application.name=campusride

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/campusride_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=campusride
spring.datasource.password=campusride123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=campusride-super-secret-key-for-jwt-token-generation-2024-minimum-256-bits
jwt.expiration=86400000

# ── Google OAuth ──────────────────────────────────────────────────────────────
google.client-id=YOUR_GOOGLE_CLIENT_ID

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.compression.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.campusride=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
