spring.application.name=campusride

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campusride_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:campusride}
spring.datasource.password=${DB_PASSWORD:campusride123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=5
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:campusride-super-secret-key-for-jwt-token-generation-2024-minimum-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Google OAuth ──────────────────────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.compression.enabled=true
server.tomcat.max-threads=20
server.tomcat.min-spare-threads=2

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.campusride=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN